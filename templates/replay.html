{% extends "layout.html" %}
{% block title %}Race Replay — {{ session.label or session.name }}{% endblock %}

{% block head %}
<style>
  /* Replay-specific overrides */
  .container { max-width: 100%; padding: 0.75rem 1rem; }
  .replay-wrap { display: flex; flex-direction: column; height: calc(100vh - 80px); }
  .track-wrap {
    flex: 1; position: relative; background: #0a1628;
    border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; min-height: 300px;
  }
  canvas { width: 100%; height: 100%; display: block; }

  /* Controls bar */
  .controls {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.5rem 0; flex-shrink: 0;
  }
  .controls .btn { min-width: 36px; text-align: center; font-size: 1rem; }
  .scrubber { flex: 1; -webkit-appearance: none; appearance: none;
    height: 6px; border-radius: 3px; background: var(--border);
    outline: none; cursor: pointer; transition: background 0.15s;
  }
  .scrubber:hover { background: #484f58; }
  .scrubber::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
    border: 2px solid var(--bg); box-shadow: 0 0 0 2px var(--accent-dim);
    transition: box-shadow 0.15s, transform 0.1s;
  }
  .scrubber::-webkit-slider-thumb:hover {
    box-shadow: 0 0 0 4px rgba(88,166,255,0.25);
    transform: scale(1.15);
  }
  .scrubber:active::-webkit-slider-thumb {
    transform: scale(0.95);
    box-shadow: 0 0 0 5px rgba(88,166,255,0.35);
  }
  /* Firefox */
  .scrubber::-moz-range-track {
    height: 6px; border-radius: 3px; background: var(--border); border: none;
  }
  .scrubber::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%; background: var(--accent);
    border: 2px solid var(--bg); box-shadow: 0 0 0 2px var(--accent-dim); cursor: pointer;
  }
  .scrubber::-moz-range-thumb:hover {
    box-shadow: 0 0 0 4px rgba(88,166,255,0.25);
  }
  .speed-label { color: var(--text-muted); font-size: 0.8rem; min-width: 32px; text-align: center; }
  .frame-label { color: var(--text-muted); font-size: 0.8rem; font-family: monospace; min-width: 120px; }

  /* Info panel below */
  .info-panel {
    display: flex; gap: 0.5rem; flex-wrap: wrap; flex-shrink: 0;
    padding: 0.4rem 0; max-height: 120px; overflow-y: auto;
  }
  .horse-chip {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.25rem 0.6rem; font-size: 0.78rem;
    transition: border-color 0.15s; cursor: default;
  }
  .horse-chip .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .horse-chip .val { font-family: monospace; }
  .horse-chip.active-skill { border-color: var(--gold); box-shadow: 0 0 6px rgba(249,199,79,0.4); }
  .horse-chip.active-duel { border-color: #f87171; box-shadow: 0 0 6px rgba(248,113,113,0.4); }
  .horse-chip.active-struggle { border-color: #fbbf24; box-shadow: 0 0 6px rgba(251,191,36,0.4); }
  .state-tag {
    font-size: 0.65rem; font-weight: 700; padding: 1px 4px;
    border-radius: 3px; background: rgba(255,255,255,0.08);
  }
  .state-tag.duel { color: #f87171; }
  .state-tag.struggle { color: #fbbf24; }
  .chip-portrait {
    width: 22px; height: 22px; border-radius: 50%; object-fit: cover;
    object-position: center 15%; flex-shrink: 0; border: 1px solid var(--border);
  }

  /* Skill popup floating above the track */
  .skill-popup {
    position: absolute; padding: 2px 7px; border-radius: 4px;
    font-size: 0.7rem; font-weight: 700; color: #fff;
    background: rgba(249,199,79,0.9); pointer-events: none;
    white-space: nowrap; transform: translate(-50%, -100%);
    animation: skillPop 0.3s ease-out;
  }
  @keyframes skillPop {
    from { opacity: 0; transform: translate(-50%, -80%); }
    to   { opacity: 1; transform: translate(-50%, -100%); }
  }
</style>
{% endblock %}

{% block content %}
<div class="breadcrumb">
  <a href="/">Sessions</a> /
  <a href="/session/{{ session.name }}">{{ session.label or session.name }}</a> /
  <a href="/session/{{ session.name }}/race/{{ race_idx }}">Race {{ race_idx }}</a> /
  <strong>Replay</strong>
</div>

<div class="replay-wrap">
  <!-- Track canvas -->
  <div class="track-wrap" id="track-wrap">
    <canvas id="track"></canvas>
  </div>

  <!-- Playback controls -->
  <div class="controls">
    <button class="btn btn-sm" id="btn-play" onclick="togglePlay()">▶</button>
    <button class="btn btn-sm" onclick="stepFrame(-1)">⏮</button>
    <button class="btn btn-sm" onclick="stepFrame(1)">⏭</button>
    <input type="range" class="scrubber" id="scrubber" min="0" max="1" step="1" value="0" oninput="scrubTo(+this.value)">
    <span class="frame-label" id="frame-label">0 / 0</span>
    <button class="btn btn-sm" onclick="changeSpeed(-1)">−</button>
    <span class="speed-label" id="speed-label">1×</span>
    <button class="btn btn-sm" onclick="changeSpeed(1)">+</button>
  </div>

  <!-- Horse info chips -->
  <div class="info-panel" id="info-panel"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
// ═══════════════════════════════════════════════════════════════════════
//  Race Replay Engine
// ═══════════════════════════════════════════════════════════════════════

const DATA    = {{ replay | tojson }};
const FRAMES  = DATA.frames;
const SKILLS  = DATA.skills || [];
const PHASES  = DATA.phases || {};
const NUM_H   = DATA.num_horses;
const TOTAL_D = DATA.total_distance || 1;
const SUMMARIES = DATA.horse_summaries || [];
const COMPETE_EVENTS = DATA.compete_events || [];
const PACE_DOWN_SEGMENTS = DATA.pace_down_segments || {};
// Note: rushed state uses per-frame t_id (temptation_mode) directly, no need for pre-computed segments here.
const COURSE = DATA.course_profile || null;

const COLORS = [
  '#f94144','#f3722c','#f8961e','#f9c74f','#90be6d',
  '#43aa8b','#577590','#4cc9f0','#7209b7','#b5179e',
  '#3a86ff','#ff006e','#fb5607','#8338ec','#06d6a0',
  '#ef476f','#ffd166','#118ab2','#073b4c',
];

// ── Horse portrait preload ────────────────────────────────────────────
// Build map: horse_index → {img: Image, url: string, name: string}
const HORSE_INFO = {};
for (const s of SUMMARIES) {
  const hi = s.horse_index;
  const url = s._image_url || '';
  const name = s._name || `H${hi}`;
  const info = { url, name, img: null, loaded: false };
  if (url) {
    const img = new Image();
    img.src = url;
    img.onload = () => { info.loaded = true; draw(); };
    info.img = img;
  }
  HORSE_INFO[hi] = info;
}

function horseLabel(hi) {
  return HORSE_INFO[hi] ? HORSE_INFO[hi].name : `H${hi}`;
}

// ── State ─────────────────────────────────────────────────────────────
let frameIdx  = 0;
let playing   = false;
let speed     = 1;          // 1×, 2×, 4×, 0.5×, 0.25×
let animId    = null;
let lastTime  = 0;
let simTime   = 0;          // current simulation time in seconds

// Precompute simulation end time
const SIM_END = FRAMES.length > 0 ? (FRAMES[FRAMES.length - 1].time || 0) : 0;

// ── Canvas ────────────────────────────────────────────────────────────
const canvas = document.getElementById('track');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('track-wrap');

function resize() {
  canvas.width  = wrap.clientWidth  * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  draw();
}
window.addEventListener('resize', resize);

// ── Track geometry ────────────────────────────────────────────────────
const MARGIN_L = 90;    // left gutter (for name labels)
const MARGIN_R = 40;
const HORSE_R  = 10;    // horse dot radius

function trackWidth()  { return wrap.clientWidth - MARGIN_L - MARGIN_R; }
function trackTop()    { return 50; }  // top padding for phase labels
function trackBottom() { return wrap.clientHeight - 30; }
function trackHeight() { return trackBottom() - trackTop(); }

// ── Lane position bounds (precomputed from all frames) ────────────────
// lane is normalized 0–1 (raw u16 / 10000). Higher = further from inside rail.
let _laneMin = Infinity, _laneMax = -Infinity;
for (const f of FRAMES) {
  for (let hi = 0; hi < NUM_H; hi++) {
    const hd = f[hi];
    if (hd && hd.lane !== undefined) {
      if (hd.lane < _laneMin) _laneMin = hd.lane;
      if (hd.lane > _laneMax) _laneMax = hd.lane;
    }
  }
}
const HAS_LANE_DATA = isFinite(_laneMin) && (_laneMax - _laneMin) > 0.005;
if (!HAS_LANE_DATA) { _laneMin = 0; _laneMax = 1; }
const LANE_PAD = Math.max(0.03, (_laneMax - _laneMin) * 0.15);
const LANE_VIEW_MIN = _laneMin - LANE_PAD;
const LANE_VIEW_MAX = _laneMax + LANE_PAD;

function horseY(hd, hi) {
  // Map lane position to Y: higher lane → top (outside rail), lower → bottom (inside)
  const pad = HORSE_R + 6;
  if (HAS_LANE_DATA && hd && hd.lane !== undefined) {
    const ratio = (hd.lane - LANE_VIEW_MIN) / (LANE_VIEW_MAX - LANE_VIEW_MIN);
    return trackBottom() - pad - ratio * (trackHeight() - pad * 2);
  }
  // Fallback: spread horses evenly (dump races with no lane data)
  const step = NUM_H > 1 ? (trackHeight() - pad * 2) / (NUM_H - 1) : 0;
  return trackTop() + pad + hi * step;
}

function distToX(d) {
  // Camera follows the pack: show a window of track around the pack center
  const f = FRAMES[frameIdx];
  if (!f) return MARGIN_L;

  // Find pack center distance
  let minD = Infinity, maxD = -Infinity;
  for (let i = 0; i < NUM_H; i++) {
    const hd = f[i] ? f[i].d : 0;
    if (hd < minD) minD = hd;
    if (hd > maxD) maxD = hd;
  }
  const centerD = (minD + maxD) / 2;

  // Visible window: show ~300m around the pack, or more for spread-out fields
  const spread = maxD - minD;
  const windowSize = Math.max(400, spread * 2.5);

  const viewStart = centerD - windowSize / 2;
  const tw = trackWidth();
  return MARGIN_L + ((d - viewStart) / windowSize) * tw;
}


// ── Skill popup tracking ──────────────────────────────────────────────
// Map: horse_index → [{skillId, startFrame, endFrame}]
let activeSkills = [];  // popups currently visible
let activeCompetes = []; // active compete events per horse

function updateActiveSkills() {
  const f = FRAMES[frameIdx];
  if (!f) return;
  const curTime = f.time;

  activeSkills = [];
  for (const sk of SKILLS) {
    const ft = sk.frame_time;
    if (ft === undefined) continue;
    // Use computed duration_secs if available, else 2s default
    const dur = sk.duration_secs || 2.0;
    if (curTime >= ft && curTime <= ft + dur) {
      activeSkills.push(sk);
    }
  }

  // Check compete events (dueling / spot struggle)
  activeCompetes = [];
  for (const ce of COMPETE_EVENTS) {
    const ft = ce.frame_time;
    const dur = ce.duration || 0;
    if (dur > 0 && curTime >= ft && curTime < ft + dur) {
      activeCompetes.push(ce);
    }
  }
}

// ── Draw ──────────────────────────────────────────────────────────────
function draw() {
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  ctx.clearRect(0, 0, W, H);

  if (FRAMES.length === 0) {
    ctx.fillStyle = '#888';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No frame data available', W / 2, H / 2);
    return;
  }

  const f = FRAMES[frameIdx];
  const tw = trackWidth();

  // ── Phase background bands ────────────────────────────
  if (PHASES.total_distance) {
    const phases = [
      { end: PHASES.phase_1_end,     color: 'rgba(26,82,118,0.25)', label: 'Opening' },
      { end: PHASES.phase_2_end,     color: 'rgba(30,132,73,0.20)', label: 'Mid' },
      { end: PHASES.phase_3_end,     color: 'rgba(183,149,11,0.18)', label: 'Final' },
      { end: PHASES.total_distance,  color: 'rgba(146,43,33,0.22)', label: 'Spurt' },
    ];
    let prev = 0;
    for (const p of phases) {
      const x1 = distToX(prev);
      const x2 = distToX(p.end);
      if (x2 > MARGIN_L && x1 < W - MARGIN_R) {
        const rx = Math.max(x1, MARGIN_L);
        const rw = Math.min(x2, W - MARGIN_R) - rx;
        ctx.fillStyle = p.color;
        ctx.fillRect(rx, trackTop(), rw, trackHeight());
        // Phase label
        const mid = (rx + rx + rw) / 2;
        if (mid > MARGIN_L + 20 && mid < W - MARGIN_R - 20) {
          ctx.fillStyle = '#ffffff55';
          ctx.font = '10px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(p.label, mid, trackTop() + 16);
        }
      }
      prev = p.end;
    }
  }

  // ── Course profile overlays (slopes & corners) ─────────
  if (COURSE) {
    const trackH = trackHeight();
    const tTop = trackTop();
    // Slope bands (top strip)
    if (COURSE.slopes) {
      for (const s of COURSE.slopes) {
        const x1 = distToX(s.start);
        const x2 = distToX(s.end);
        if (x2 > MARGIN_L && x1 < W - MARGIN_R) {
          const rx = Math.max(x1, MARGIN_L);
          const rw = Math.min(x2, W - MARGIN_R) - rx;
          const isUp = s.direction === 'uphill';
          ctx.fillStyle = isUp ? 'rgba(248,81,73,0.12)' : 'rgba(63,185,80,0.12)';
          ctx.fillRect(rx, tTop, rw, trackH);
          // Slope label at top
          const mid = (rx + rx + rw) / 2;
          if (rw > 30 && mid > MARGIN_L + 10 && mid < W - MARGIN_R - 10) {
            ctx.fillStyle = isUp ? 'rgba(248,81,73,0.7)' : 'rgba(63,185,80,0.7)';
            ctx.font = 'bold 8px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(s.label, mid, tTop + 28);
          }
        }
      }
    }
    // Corner bands (subtle purple at bottom)
    if (COURSE.corners) {
      for (const c of COURSE.corners) {
        const x1 = distToX(c.start);
        const x2 = distToX(c.start + c.length);
        if (x2 > MARGIN_L && x1 < W - MARGIN_R) {
          const rx = Math.max(x1, MARGIN_L);
          const rw = Math.min(x2, W - MARGIN_R) - rx;
          ctx.fillStyle = 'rgba(188,140,255,0.08)';
          ctx.fillRect(rx, tTop + trackH - 6, rw, 6);
        }
      }
    }
  }

  // ── Distance markers ──────────────────────────────────
  ctx.strokeStyle = '#ffffff15';
  ctx.lineWidth = 1;
  ctx.fillStyle = '#ffffff40';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  const step = TOTAL_D > 2000 ? 500 : TOTAL_D > 1000 ? 200 : 100;
  for (let dm = 0; dm <= TOTAL_D; dm += step) {
    const x = distToX(dm);
    if (x > MARGIN_L && x < W - MARGIN_R) {
      ctx.beginPath();
      ctx.moveTo(x, trackTop() + 20);
      ctx.lineTo(x, trackBottom() - 10);
      ctx.stroke();
      ctx.fillText(dm + 'm', x, trackBottom() + 2);
    }
  }

  // ── Finish line ───────────────────────────────────────
  const finishX = distToX(TOTAL_D);
  if (finishX > MARGIN_L && finishX < W - MARGIN_R) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(finishX, trackTop() + 20);
    ctx.lineTo(finishX, trackBottom() - 10);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('FINISH', finishX, trackTop() + 14);
  }

  // ── Track rails & lane guides ───────────────────────────────────
  if (HAS_LANE_DATA) {
    // Subtle horizontal guide lines (quartiles of lane range)
    ctx.strokeStyle = '#ffffff08';
    ctx.lineWidth = 1;
    for (let q = 0; q <= 4; q++) {
      const ratio = q / 4;
      const gy = trackBottom() - (HORSE_R + 6) - ratio * (trackHeight() - (HORSE_R + 6) * 2);
      ctx.beginPath();
      ctx.moveTo(MARGIN_L, gy);
      ctx.lineTo(W - MARGIN_R, gy);
      ctx.stroke();
    }
    // Inside rail label (bottom) and outside rail label (top)
    ctx.fillStyle = '#ffffff25';
    ctx.font = '8px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('INNER', MARGIN_L + 4, trackBottom() - 4);
    ctx.fillText('OUTER', MARGIN_L + 4, trackTop() + 22);
  } else {
    // Fallback: simple guide lines when no lane data
    ctx.strokeStyle = '#ffffff08';
    ctx.lineWidth = 1;
    for (let hi = 0; hi <= NUM_H; hi++) {
      const step = NUM_H > 1 ? (trackHeight() - (HORSE_R + 6) * 2) / (NUM_H - 1) : 0;
      const gy = trackTop() + (HORSE_R + 6) + hi * step - 4;
      ctx.beginPath();
      ctx.moveTo(MARGIN_L, gy);
      ctx.lineTo(W - MARGIN_R, gy);
      ctx.stroke();
    }
  }

  // ── Horses ────────────────────────────────────────────
  if (!f) return;
  updateActiveSkills();

  for (let hi = 0; hi < NUM_H; hi++) {
    const hd = f[hi];
    if (!hd) continue;
    const x = distToX(hd.d);
    const y = horseY(hd, hi);
    const color = COLORS[hi % COLORS.length];

    // Is this horse activating a skill right now?
    const hasSkill = activeSkills.some(s => s.horse_index === hi);
    const hInfo = HORSE_INFO[hi];

    // Check rushed state (掛かり / kakari / temptation mode)
    const temptId = hd.t_id || 0;
    const isTempted = temptId > 0;
    const isRushedBoost = temptId === 4;

    // Check pace down state (heuristic, from pre-computed segments)
    const pdSegs = PACE_DOWN_SEGMENTS[String(hi)] || [];
    const curTime = f.time || 0;
    const isPaceDown = pdSegs.some(s => curTime >= s.start_time && curTime <= s.end_time);

    // Check compete events
    const isDueling = activeCompetes.some(c => c.horse_index === hi && (c.type_id === 5));
    const isSpotStruggle = activeCompetes.some(c => c.horse_index === hi && (c.type_id === 4));

    // Outer ring for rushed / compete / pace down states
    if (isDueling) {
      ctx.beginPath();
      ctx.arc(x, y, HORSE_R + 4, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(248, 113, 113, 0.8)';
      ctx.lineWidth = 2;
      ctx.stroke();
    } else if (isSpotStruggle) {
      ctx.beginPath();
      ctx.arc(x, y, HORSE_R + 4, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(251, 191, 36, 0.8)';
      ctx.lineWidth = 2;
      ctx.stroke();
    } else if (isRushedBoost) {
      ctx.beginPath();
      ctx.arc(x, y, HORSE_R + 4, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(210, 153, 34, 0.8)';
      ctx.lineWidth = 2;
      ctx.stroke();
    } else if (isTempted) {
      ctx.beginPath();
      ctx.arc(x, y, HORSE_R + 4, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(139, 148, 158, 0.5)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([3, 3]);
      ctx.stroke();
      ctx.setLineDash([]);
    } else if (isPaceDown) {
      ctx.beginPath();
      ctx.arc(x, y, HORSE_R + 4, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(88, 166, 255, 0.7)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 2]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Horse dot / portrait
    if (hasSkill) {
      ctx.shadowColor = '#f9c74f';
      ctx.shadowBlur = 12;
    } else if (isDueling) {
      ctx.shadowColor = '#f87171';
      ctx.shadowBlur = 10;
    } else if (isSpotStruggle) {
      ctx.shadowColor = '#fbbf24';
      ctx.shadowBlur = 10;
    }

    if (hInfo && hInfo.loaded && hInfo.img) {
      // Draw circular clipped portrait
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, HORSE_R, 0, Math.PI * 2);
      ctx.clip();
      // Draw image centered, covering the circle (crop to face area)
      const imgSize = HORSE_R * 2.5;
      ctx.drawImage(hInfo.img, x - HORSE_R, y - HORSE_R * 1.3, imgSize, imgSize);
      ctx.restore();
      // Border
      ctx.beginPath();
      ctx.arc(x, y, HORSE_R, 0, Math.PI * 2);
      ctx.strokeStyle = hasSkill ? '#f9c74f' : color;
      ctx.lineWidth = hasSkill ? 2.5 : 1.5;
      ctx.stroke();
    } else {
      // Fallback: colored dot
      ctx.beginPath();
      ctx.arc(x, y, HORSE_R, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = hasSkill ? '#f9c74f' : '#00000080';
      ctx.lineWidth = hasSkill ? 2 : 1;
      ctx.stroke();
      // Index label inside dot
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 9px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(hi, x, y);
    }
    ctx.shadowBlur = 0;

    // Left gutter label
    ctx.fillStyle = color;
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(horseLabel(hi), MARGIN_L - 8, y);

    // Skill popup above horse
    if (hasSkill) {
      const skillsForHorse = activeSkills.filter(s => s.horse_index === hi);
      for (let si = 0; si < skillsForHorse.length; si++) {
        const sk = skillsForHorse[si];
        const popY = y - HORSE_R - 8 - si * 18;
        // Popup background
        const label = sk.skill_label || `SKILL ${sk.skill_id}`;
        ctx.font = 'bold 10px sans-serif';
        const tw2 = ctx.measureText(label).width + 8;
        ctx.fillStyle = 'rgba(249,199,79,0.9)';
        roundRect(ctx, x - tw2/2, popY - 12, tw2, 16, 4);
        ctx.fill();
        // Popup text
        ctx.fillStyle = '#000';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(label, x, popY - 4);
      }
    }

    // HP bar under horse
    if (hd.hp !== undefined) {
      const maxHp = getMaxHp(hi);
      const hpPct = maxHp > 0 ? hd.hp / maxHp : 1;
      const barW = 24, barH = 3;
      ctx.fillStyle = '#333';
      ctx.fillRect(x - barW/2, y + HORSE_R + 3, barW, barH);
      ctx.fillStyle = hpPct > 0.5 ? '#3fb950' : hpPct > 0.2 ? '#d29922' : '#f85149';
      ctx.fillRect(x - barW/2, y + HORSE_R + 3, barW * hpPct, barH);
    }
  }

  // ── Top-left race time ────────────────────────────────
  ctx.fillStyle = '#ffffffcc';
  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  const timeStr = f.time !== undefined ? f.time.toFixed(1) + 's' : `F${frameIdx}`;
  ctx.fillText(timeStr, 10, 10);

  ctx.textBaseline = 'alphabetic';
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ── Max HP lookup (from first frame) ──────────────────────────────────
const _maxHp = {};
function getMaxHp(hi) {
  if (_maxHp[hi] !== undefined) return _maxHp[hi];
  if (FRAMES.length > 0 && FRAMES[0][hi]) {
    _maxHp[hi] = FRAMES[0][hi].hp || 1;
  } else {
    _maxHp[hi] = 1;
  }
  return _maxHp[hi];
}

// ── Info panel (chips below track) ────────────────────────────────────
function updateInfoPanel() {
  const f = FRAMES[frameIdx];
  if (!f) return;
  const panel = document.getElementById('info-panel');
  let html = '';
  for (let hi = 0; hi < NUM_H; hi++) {
    const hd = f[hi];
    if (!hd) continue;
    const color = COLORS[hi % COLORS.length];
    const hasSkill = activeSkills.some(s => s.horse_index === hi);
    const isDueling = activeCompetes.some(c => c.horse_index === hi && c.type_id === 5);
    const isSpotStruggle = activeCompetes.some(c => c.horse_index === hi && c.type_id === 4);
    const temptId = hd.t_id || 0;
    const isTempted = temptId > 0;

    // Check pace down from pre-computed segments
    const pdSegs = PACE_DOWN_SEGMENTS[String(hi)] || [];
    const curTime = f.time || 0;
    const isPaceDown = pdSegs.some(s => curTime >= s.start_time && curTime <= s.end_time);

    let cls = 'horse-chip';
    if (hasSkill) cls += ' active-skill';
    if (isDueling) cls += ' active-duel';
    if (isSpotStruggle) cls += ' active-struggle';

    const maxHp = getMaxHp(hi);
    const hpPct = maxHp > 0 ? Math.round(hd.hp / maxHp * 100) : 100;
    const summary = SUMMARIES.find(s => s.horse_index === hi);
    const styleTag = summary ? (summary.running_style || '') : '';
    const hInfo = HORSE_INFO[hi];
    const portraitHtml = hInfo && hInfo.url
      ? `<img src="${hInfo.url}" class="chip-portrait" alt="">`
      : `<span class="dot" style="background:${color}"></span>`;
    const label = hInfo ? hInfo.name : `H${hi}`;

    // State indicator tags
    let stateHtml = '';
    if (isDueling) stateHtml += '<span class="state-tag duel">⚔ Duel</span>';
    if (isSpotStruggle) stateHtml += '<span class="state-tag struggle">🏃 Struggle</span>';
    if (isTempted) {
      const temptNames = {1: 'Rushed (Sashi)', 2: 'Rushed (Senko)', 3: 'Rushed (Nige)', 4: 'Rushed (Boost)'};
      const tname = temptNames[temptId] || `Rushed ${temptId}`;
      const tcolor = temptId === 4 ? 'var(--orange)' : 'var(--red)';
      stateHtml += `<span class="state-tag" style="color:${tcolor}">掛 ${tname}</span>`;
    }
    if (isPaceDown) {
      stateHtml += '<span class="state-tag" style="color:var(--accent)">⏬ Pace Down</span>';
    }

    // Compute acceleration from next frame
    let accelStr = '';
    const nextF = FRAMES[frameIdx + 1];
    if (nextF && nextF[hi]) {
      const dt = (nextF.time || 0) - (f.time || 0);
      if (dt > 0) {
        const accel = (nextF[hi].s - hd.s) / dt;
        const sign = accel >= 0 ? '+' : '';
        const accelColor = accel > 0.1 ? 'var(--green)' : accel < -0.1 ? 'var(--red)' : 'var(--text-muted)';
        accelStr = `<span class="val" style="color:${accelColor}">ACC ${sign}${accel.toFixed(2)}</span>`;
      }
    }

    html += `<div class="${cls}">
      ${portraitHtml}
      <b>${label}</b>
      ${styleTag ? `<span style="color:var(--text-muted)">${styleTag}</span>` : ''}
      <span class="val">${Math.round(hd.d)}m</span>
      ${HAS_LANE_DATA ? `<span class="val" style="color:var(--text-muted)">L ${(hd.lane * 100).toFixed(0)}</span>` : ''}
      <span class="val" style="color:${hpPct > 50 ? 'var(--green)' : hpPct > 20 ? 'var(--orange)' : 'var(--red)'}">HP ${hpPct}%</span>
      <span class="val" style="color:var(--text-muted)">SPD ${hd.s}</span>
      ${accelStr}
      ${stateHtml}
    </div>`;
  }
  panel.innerHTML = html;
}

// ── Playback ──────────────────────────────────────────────────────────
const scrubber    = document.getElementById('scrubber');
const frameLabel  = document.getElementById('frame-label');
const speedLabel  = document.getElementById('speed-label');
const btnPlay     = document.getElementById('btn-play');

scrubber.max = Math.max(0, FRAMES.length - 1);

function setFrame(idx) {
  frameIdx = Math.max(0, Math.min(idx, FRAMES.length - 1));
  simTime = FRAMES[frameIdx] ? (FRAMES[frameIdx].time || 0) : 0;
  scrubber.value = frameIdx;
  const t = simTime.toFixed(1);
  frameLabel.textContent = `${frameIdx} / ${FRAMES.length - 1}  (${t}s)`;
  draw();
  updateInfoPanel();
}

function togglePlay() {
  playing = !playing;
  btnPlay.textContent = playing ? '⏸' : '▶';
  if (playing) {
    lastTime = performance.now();
    animate();
  } else {
    cancelAnimationFrame(animId);
  }
}

// Binary search: find the last frame whose time <= target
function findFrameForTime(t) {
  let lo = 0, hi = FRAMES.length - 1;
  while (lo < hi) {
    const mid = (lo + hi + 1) >> 1;
    if ((FRAMES[mid].time || 0) <= t) lo = mid;
    else hi = mid - 1;
  }
  return lo;
}

function animate(now) {
  if (!playing) return;
  if (!now) now = performance.now();
  const dtMs = now - lastTime;
  lastTime = now;

  // Advance simulation time by real elapsed time × playback speed
  simTime += (dtMs / 1000) * speed;

  if (simTime >= SIM_END) {
    simTime = SIM_END;
    playing = false;
    btnPlay.textContent = '▶';
  }

  const newIdx = findFrameForTime(simTime);
  if (newIdx !== frameIdx) {
    frameIdx = newIdx;
  }

  setFrameFromSim();
  if (playing) animId = requestAnimationFrame(animate);
}

// Like setFrame but doesn't overwrite simTime (used by animate loop)
function setFrameFromSim() {
  scrubber.value = frameIdx;
  const t = simTime.toFixed(1);
  frameLabel.textContent = `${frameIdx} / ${FRAMES.length - 1}  (${t}s)`;
  draw();
  updateInfoPanel();
}

function stepFrame(delta) {
  if (playing) togglePlay();
  setFrame(frameIdx + delta);
}

function scrubTo(val) {
  if (playing) togglePlay();
  setFrame(val);
}

const SPEEDS = [0.25, 0.5, 1, 2, 4, 8];
let speedIdx = 2; // 1×
function changeSpeed(dir) {
  speedIdx = Math.max(0, Math.min(SPEEDS.length - 1, speedIdx + dir));
  speed = SPEEDS[speedIdx];
  speedLabel.textContent = speed + '×';
}

// ── Keyboard shortcuts ────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space')      { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') { e.preventDefault(); stepFrame(1); }
  if (e.code === 'ArrowLeft')  { e.preventDefault(); stepFrame(-1); }
  if (e.code === 'ArrowUp')    { e.preventDefault(); changeSpeed(1); }
  if (e.code === 'ArrowDown')  { e.preventDefault(); changeSpeed(-1); }
  if (e.code === 'Home')       { e.preventDefault(); setFrame(0); }
  if (e.code === 'End')        { e.preventDefault(); setFrame(FRAMES.length - 1); }
});

// ── Init ──────────────────────────────────────────────────────────────
resize();
setFrame(0);
</script>
